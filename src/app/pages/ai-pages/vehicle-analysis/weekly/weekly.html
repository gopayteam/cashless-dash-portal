<!-- week-analysis-tab.component.html -->
<div class="tab-controls">
  <div class="control-group">
    <label class="filter-label">Select Week Range <span class="range-note">(7 days)</span></label>

    <div class="date-range-row">
      <!-- Start date — freely pickable -->
      <mat-form-field appearance="outline" class="date-field">
        <mat-label>Start Date</mat-label>
        <input matInput [matDatepicker]="startPicker" [(ngModel)]="startDate"
          (dateChange)="onStartChange()" />
        <mat-datepicker-toggle matIconSuffix [for]="startPicker" />
        <mat-datepicker #startPicker />
      </mat-form-field>

      <span class="range-arrow"><i class="pi pi-arrow-right"></i></span>

      <!-- End date — auto-calculated, read-only -->
      <mat-form-field appearance="outline" class="date-field end-locked">
        <mat-label>End Date (auto)</mat-label>
        <input matInput [matDatepicker]="endPicker" [(ngModel)]="endDate"
          [min]="endMin" [max]="endMax" readonly />
        <mat-datepicker-toggle matIconSuffix [for]="endPicker" [disabled]="true" />
        <mat-datepicker #endPicker [disabled]="true" />
      </mat-form-field>
    </div>

    <span class="week-range-badge" *ngIf="startDate">
      <i class="pi pi-calendar"></i>
      {{ rangeLabel }}
      <span class="day-count">· 7 days</span>
    </span>
  </div>

  <button pButton icon="pi pi-play" label="Run Week Analysis" class="run-btn"
    [disabled]="!canAnalyse || loading" (click)="run()"></button>
</div>

<app-vehicle-analysis-panel [data]="result" [loading]="loading" />
